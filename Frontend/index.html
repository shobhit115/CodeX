<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/codex-logo-icon.svg" />
    <link rel="apple-touch-icon" href="/codex-logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2ec5d4" />
    <meta name="description" content="CodeX - Secure Admin Portal for Event & Certificate Management" />
    <meta property="og:title" content="CodeX Portal" />
    <meta property="og:description" content="CodeX - Secure Admin Portal for Event & Certificate Management" />
    <meta property="og:image" content="/codex-logo.svg" />
    <title>CodeX</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
